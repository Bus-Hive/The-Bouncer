ktor {
  deployment {
    port = 8081
    port = ${?PORT}
  }

  application {
    modules = [com.trackmybus.theBouncer.ApplicationKt.module]
  }

  server {
    isProd = false
  }
}

postgres {
  driverClass = "org.postgresql.Driver"
  jdbcURL = "jdbc:postgresql://"
  jdbcURL = ${?JDBC_URL}
  host = "localhost"
  host = ${?DB_HOST}
  port = 5432
  port = ${?DB_PORT}
  database = "TrackMyBus"
  database = ${?DB_NAME}
  user = "postgres"
  user = ${?DB_USER}
  password = "postgres"
  password = ${?DB_PASSWORD}
  maxPoolSize = 50
  maxPoolSize = ${?MAX_DB_POOL_SIZE}
  autoCommit = true
  autoCommit = ${?DB_AUTO_COMMIT}
}

redis {
  host = "localhost"
  host = ${?REDIS_HOST}
  port = 6379
  port = ${?REDIS_PORT}
  password = "password"
  password = ${?REDIS_PASSWORD}
  database = 0
  database = ${?REDIS_DB}
}

password {
  saltLength = 16
  hashLength = 32
  iterations = 5
  memoryKb = 65536
  parallelism = 2
}

jwt {
  secret = "eT1ksI4jBYdWTjZcNnrZpfN8ZpunDr75"
  secret = ${?JWT_SECRET}
  issuer = "http://0.0.0.0:8080/"
  issuer = ${?JWT_ISSUER}
  audience = "http://0.0.0.0:8080/hello"
  audience = ${?JWT_AUDIENCE}
  realm = "Access to 'hello'"
  accessTokenValiditySeconds = 3600
  refreshTokenValiditySeconds = 86400
}