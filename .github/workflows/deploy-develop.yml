name: Deploy The-Bouncer to DEV Server

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: DEV
    name: Deploy to DEV Server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy Blue-Green with Kong
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            cd The-Bouncer
            git pull origin develop
  
            # Get current active instance from Kong Admin API
            ACTIVE_TARGET=$(curl -s http://10.0.0.17:8001/upstreams/the-bouncer/targets | jq -r '.data[] | select(.weight == 100) | .target' | awk -F: '{print $1 ":" $2}')
            echo "Current active target: $ACTIVE_TARGET"
            if [ "$ACTIVE_TARGET" = "10.0.0.91:8091" ]; then
              NEW_VERSION="green"
              NEW_PORT=8090
              OLD_VERSION="blue"
              OLD_PORT=8091
            else
              NEW_VERSION="blue"
              NEW_PORT=8091
              OLD_VERSION="green"
              OLD_PORT=8090
            fi
  
            echo "Deploying new version to $NEW_VERSION..."
            sudo docker compose -f docker-compose.develop.yml up -d the-bouncer-$NEW_VERSION --remove-orphans
  
            # Health check with retry logic
            max_retries=10
            retry_count=0
            echo "Waiting for $NEW_VERSION to be healthy..."
            while [ $retry_count -lt $max_retries ]; do
                if curl http://localhost:$NEW_PORT/health >/dev/null; then
                echo "Service is healthy!"
                break
              else
                retry_count=$((retry_count+1))
                echo "Health check failed (attempt $retry_count/$max_retries)"
                sleep 5
              fi
            done
  
            if [ $retry_count -eq $max_retries ]; then
              echo "Health check failed after $max_retries attempts. Rolling back..."
              sudo docker compose -f docker-compose.develop.yml stop the-bouncer-$NEW_VERSION
              sudo docker compose -f docker-compose.develop.yml rm -f the-bouncer-$NEW_VERSION
              sudo docker system prune -af
              echo "Removed failed $NEW_VERSION container"
              exit 1
            fi
  
            echo "New version is healthy. Gradually shifting traffic..."
  
            # Gradually shift traffic to new version
            for i in $(seq 10 10 100); do
              curl -X PATCH http://10.0.0.17:8001/upstreams/the-bouncer/targets/10.0.0.91:$NEW_PORT -d "weight=$i"
              curl -X PATCH http://10.0.0.17:8001/upstreams/the-bouncer/targets/10.0.0.91:$OLD_PORT -d "weight=$((100-i))"
              echo "Traffic shifted: $i% to $NEW_VERSION"
              sleep 5
            done
  
            echo "100% traffic now on $NEW_VERSION. Removing old version..."
            sudo docker compose -f docker-compose.develop.yml stop the-bouncer-$OLD_VERSION
            sudo docker compose -f docker-compose.develop.yml rm -f the-bouncer-$OLD_VERSION
  
            sudo docker system prune -af
  
            echo "Deployment complete!"
          EOF
